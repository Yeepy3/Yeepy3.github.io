short_bio: >-
  <p>
    I am a pre-doctoral researcher at the <a href="https://inmc.snu.ac.kr/en/">Institute of New Media and Communications (INMC)</a>,
    <a href="https://en.snu.ac.kr/">Seoul National University (SNU)</a>. 
    I will start my Ph.D. journey in Sep. 2026 at the <a href="https://www.ucr.edu/">University of California, Riverside</a>,
    in the Department of Electrical and Computer Engineering (ECE),
    advised by <a href="https://hangqiu.github.io/">Prof. Hang Qiu</a> (<a href="https://cisl.ucr.edu/">CISL</a>)
    and <a href="https://cs.ucr.edu/~ztan/">Prof. Zhaowei Tan</a>.
  </p>
  <p>
    My research focuses on AI-driven communications and networking for Cyber-Physical Systems (CPS), with an emphasis on cooperative autonomous driving and robotics. 
    I design resilient, low-latency edge computing systems that empower the next generation of autonomous agents.
  </p>

